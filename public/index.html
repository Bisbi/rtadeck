<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <title>rtaDeck</title>

  <!-- NES.css -->
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
  <!-- Google Fonts: Pixel fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <!-- App CSS -->
  <link href="css/style.css" rel="stylesheet">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div id="app">
    <main id="grid-container"></main>
    <nav id="tab-bar"></nav>
  </div>

  <!-- Editor Overlay -->
  <div id="editor-overlay" class="hidden">
    <div class="nes-container is-dark is-rounded" id="editor-dialog">
      <h3 class="editor-title">Edit Button</h3>
      <form id="editor-form">
        <div class="editor-row">
          <label class="nes-text">Display</label>
          <div class="editor-inline">
            <select id="ed-display-type" class="nes-select is-dark">
              <option value="emoji">Emoji</option>
              <option value="text">Text</option>
            </select>
            <input id="ed-content" class="nes-input is-dark" placeholder="Content">
          </div>
        </div>
        <div class="editor-row">
          <label class="nes-text">Label</label>
          <input id="ed-label" class="nes-input is-dark" placeholder="Label (optional)">
        </div>
        <div class="editor-row">
          <label class="nes-text">Size</label>
          <div class="editor-inline size-picker">
            <button type="button" class="nes-btn size-btn" data-size="S">S</button>
            <button type="button" class="nes-btn size-btn is-primary" data-size="M">M</button>
            <button type="button" class="nes-btn size-btn" data-size="L">L</button>
          </div>
        </div>
        <div class="editor-row">
          <label class="nes-text">Colors</label>
          <div class="editor-inline">
            <label>BG <input id="ed-bg-color" type="color" value="#1D2B53"></label>
            <label>Text <input id="ed-color" type="color" value="#FFF1E8"></label>
          </div>
        </div>
        <hr>
        <div class="editor-row">
          <label class="nes-text">Action</label>
          <select id="ed-action-type" class="nes-select is-dark">
            <option value="url">URL (browser)</option>
            <option value="open">Open (program)</option>
            <option value="keys">Keys (shortcut)</option>
            <option value="cli">CLI (command)</option>
            <option value="agent">Agent (AI)</option>
          </select>
        </div>
        <div class="editor-row" id="ed-row-target">
          <label class="nes-text" id="ed-target-label">Target</label>
          <input id="ed-target" class="nes-input is-dark" placeholder="URL, command, key combo...">
        </div>
        <div class="editor-row" id="ed-row-cwd">
          <label class="nes-text" id="ed-cwd-label">CWD</label>
          <input id="ed-cwd" class="nes-input is-dark" placeholder="Working directory (optional)">
        </div>
        <div class="editor-row" id="ed-row-terminal" style="display:none">
          <label class="nes-text">Terminal</label>
          <select id="ed-terminal" class="nes-select is-dark">
            <option value="cmd">cmd</option>
            <option value="powershell">PowerShell</option>
            <option value="wt">Windows Terminal</option>
          </select>
        </div>
        <div class="editor-buttons">
          <button type="button" id="ed-delete" class="nes-btn is-error">Delete</button>
          <button type="button" id="ed-cancel" class="nes-btn">Cancel</button>
          <button type="submit" class="nes-btn is-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay" class="hidden">
    <div class="nes-container is-dark is-rounded" id="settings-dialog">
      <h3 class="editor-title">Settings</h3>

      <div class="settings-section">
        <h4 class="settings-heading">Profiles</h4>
        <div id="settings-profiles-list"></div>
        <div class="editor-inline" style="margin-top:8px">
          <button id="settings-add-profile" class="nes-btn is-success settings-sm-btn">+ New</button>
          <button id="settings-dup-profile" class="nes-btn is-warning settings-sm-btn">Duplicate</button>
          <button id="settings-migrate-profile" class="nes-btn settings-sm-btn" id="settings-migrate">Migrate</button>
        </div>
        <p class="settings-hint">Profiles group pages together. Switch between them instantly.</p>
      </div>

      <div class="settings-section">
        <h4 class="settings-heading">Pages <span id="settings-profile-badge" class="settings-hint"></span></h4>
        <div id="settings-pages-list"></div>
        <button id="settings-add-page" class="nes-btn is-success settings-full-btn">+ Add Page</button>
      </div>

      <div class="settings-section">
        <h4 class="settings-heading">Grid</h4>
        <div class="editor-inline">
          <label class="settings-label">Cols <input id="settings-cols" type="number" min="1" max="10" value="5" class="nes-input is-dark settings-num"></label>
          <label class="settings-label">Rows <input id="settings-rows" type="number" min="1" max="6" value="3" class="nes-input is-dark settings-num"></label>
        </div>
      </div>

      <div class="settings-section">
        <h4 class="settings-heading">Server</h4>
        <div class="editor-inline">
          <label class="settings-label">Port <input id="settings-port" type="number" value="3000" class="nes-input is-dark settings-num" disabled></label>
        </div>
        <p class="settings-hint">Edit rtadeck.config.json to change port</p>
      </div>

      <div class="editor-buttons">
        <button id="settings-close" class="nes-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Purge stale service workers + caches before app loads -->
  <script>
    (async()=>{if(!navigator.serviceWorker)return;
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
